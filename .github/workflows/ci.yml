name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: taproot-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: taproot
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: gnolith/diamond
          ref: d90c67ef5b2dda368a0508cb222f0027941af89c
          path: diamond
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: taproot/package-lock.json
      - run: npm ci
        working-directory: diamond
      - run: npm run build
        working-directory: diamond
      - run: npm ci
        working-directory: taproot
      - run: npm run check
        working-directory: taproot
      - run: npm run pack:check
        if: matrix.node == 24
        working-directory: taproot
