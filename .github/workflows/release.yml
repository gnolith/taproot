name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Verify the annotated tag and release commit
        shell: bash
        run: |
          tag_type="$(git cat-file -t "refs/tags/$GITHUB_REF_NAME")"
          test "$tag_type" = tag
          git fetch --no-tags origin refs/heads/main:refs/remotes/origin/main
          release_commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          git merge-base --is-ancestor "$release_commit" refs/remotes/origin/main
      - run: npm ci
      - run: npm run check
      - name: Verify release metadata and artifact contents
        run: npm run release:check -- "$GITHUB_REF_NAME"
      - run: npm pack
      - name: Generate SBOM and checksums
        shell: bash
        run: |
          npm sbom --omit=dev --sbom-format cyclonedx > "taproot-${GITHUB_REF_NAME#v}.sbom.json"
          sha256sum ./*.tgz ./*.sbom.json > SHA256SUMS
      - uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            *.tgz
            *.sbom.json
            SHA256SUMS
      - name: Publish to npm through the configured OIDC trusted publisher
        run: npm publish ./*.tgz --access public --provenance
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" ./*.tgz ./*.sbom.json SHA256SUMS
          --generate-notes --verify-tag
